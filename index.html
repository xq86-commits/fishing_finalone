<!doctype html>
<html lang="zh-CN">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Words Fishing Lingo</title>
  <style>
    link[rel=preload] {
      display: none;
    }
  </style>
  <link rel="preload" href="./games/game.js" as="script">
  <link rel="preload" href="./games/game.html" as="document">
  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      overflow: hidden;
      background: url('fish_assets/bg.png') no-repeat center center fixed;
      background-size: cover;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif
    }

    /* 状态工具类 */
    .is-hidden {
      display: none !important;
      pointer-events: none !important;
    }

    .is-flex {
      display: flex !important;
      pointer-events: auto !important;
    }

    .is-block {
      display: block !important;
      pointer-events: auto !important;
    }

    /* 通用按钮 */
    button {
      padding: 12px 24px;
      border: none;
      border-radius: 8px;
      background: #1F6FCF;
      color: #fff;
      font-size: 16px;
      cursor: pointer;
      box-shadow: 0 4px 0 rgba(0, 0, 0, .18)
    }

    button:active {
      transform: translateY(2px)
    }

    #start-btn,
    #next-btn {
      background: #FF6042;
    }

    #easier-mode-btn {
      background: #87CEEB;
    }

    /* 启动页 */
    #start-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      height: 100vh;
      position: relative;
      /* background removed */
    }

    #start-screen button {
      width: 200px;
    }

    #start-screen h1 {
      color: #084B90;
      font-size: 28px;
      margin-bottom: 16px
    }

    /* Loading */
    #loading {
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #fff;
      height: 100vh;
      background: #000
    }

    .loader {
      width: 50px;
      height: 50px;
      border: 6px solid rgba(255, 255, 255, .3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 12px
    }

    @keyframes spin {
      to {
        transform: rotate(360deg)
      }
    }

    /* 游戏 iframe 容器 */
    #game-wrapper {
      position: relative;
      z-index: 0;
      width: 100%;
      max-width: 420px;
      aspect-ratio: 375/812;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 0 20px rgba(0, 0, 0, .4);
      margin: auto
    }

    #game-frame {
      width: 100%;
      height: 100%;
      border: none;
      background: #000;
      display: block
    }

    #game-back {
      position: absolute;
      top: 90px;
      left: 0px;
      z-index: 10;
      background: unset;
      border: none;
      border-image: none;
      color: #666;
      font-size: 18px;
      font-weight: normal;
      cursor: pointer;
      padding: 8px 12px;
      border-radius: 4px;
      box-shadow: none;
      box-sizing: content-box;
      transform: scale(1.5);
      transition: background 0.2s, transform 0.1s;
      line-height: 1;
    }

    #game-back:hover {
      background: unset;
    }

    #game-back:active {
      transform: scale(1.425);
      background: #eeeeee;
    }

    /* 结算页（全屏） */
    #result-screen {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .65);
      color: #fff;
      z-index: 999;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 18px;
      text-align: center;
      padding-bottom: env(safe-area-inset-bottom)
    }

    #result-screen h2 {
      font-size: 28px;
      margin-bottom: 10px
    }

    #result-screen button {
      width: 200px;
      padding: 12px 0;
      border-radius: 8px
    }

    /* 排行榜（全屏） */
    #rank-screen {
      position: fixed;
      inset: 0;
      inset: 0;
      /* background removed */
      color: #1E2D3C;
      color: #1E2D3C;
      z-index: 1000;
      flex-direction: column;
      height: 100vh;
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
      overflow: hidden
    }

    #rank-header {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      height: 60px;
      background: rgba(255, 255, 255, .75);
      backdrop-filter: blur(6px);
      font-size: 20px;
      font-weight: bold;
      color: #1E2D3C
    }

    #rank-back {
      position: absolute;
      left: 12px;
      background: none;
      border: none;
      color: #1E2D3C;
      font-size: 16px;
      cursor: pointer;
      padding: 10px
    }

    #rank-list {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      width: 100%;
      max-width: 480px;
      margin: 0 auto;
      padding: 20px;
      box-sizing: border-box
    }

    .rank-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      background: rgba(255, 255, 255, .85);
      padding: 12px 16px;
      margin-bottom: 10px;
      border-radius: 12px;
      font-size: 15px;
      color: #1E2D3C;
      box-shadow: 0 6px 16px rgba(31, 75, 114, .12)
    }

    .rank-main {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0
    }

    .rank-index {
      width: 28px;
      text-align: center;
      font-weight: 700;
      font-size: 16px
    }

    .rank-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      object-fit: cover;
      background: rgba(0, 0, 0, .2)
    }

    .rank-avatar--placeholder {
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 16px;
      color: #1E2D3C;
      background: rgba(255, 255, 255, .6);
      text-transform: uppercase
    }

    .rank-info {
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: 0
    }

    .rank-name {
      font-weight: 700;
      font-size: 15px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap
    }

    .rank-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: rgba(31, 75, 114, .75)
    }

    .rank-meta:empty {
      display: none
    }

    .rank-vip {
      padding: 2px 8px;
      border-radius: 999px;
      background: linear-gradient(90deg, #ffd66b, #ffae00);
      color: #312200;
      font-weight: 700;
      font-size: 12px
    }

    .rank-time {
      padding: 2px 6px;
      border-radius: 999px;
      background: rgba(31, 75, 114, .1);
      color: #1E2D3C
    }

    .rank-score {
      font-weight: 700;
      font-size: 16px;
      color: #F36900
    }

    .rank-loading,
    .rank-error,
    .rank-empty {
      padding: 30px 10px;
      text-align: center;
      font-size: 14px;
      color: rgba(31, 75, 114, .7)
    }

    .rank-item.top1 {
      background: linear-gradient(90deg, #ffe699, #ffd24c);
      color: #1E2D3C
    }

    .rank-item.top2 {
      background: linear-gradient(90deg, #f4f4f4, #d3d6d8);
      color: #1E2D3C
    }

    .rank-item.top3 {
      background: linear-gradient(90deg, #f5d0a0, #d08b44);
      color: #1E2D3C
    }

    .rank-item.top1 .rank-avatar--placeholder,
    .rank-item.top2 .rank-avatar--placeholder,
    .rank-item.top3 .rank-avatar--placeholder {
      background: rgba(255, 255, 255, .6);
      color: #1E2D3C
    }

    .rank-item.top1 .rank-meta,
    .rank-item.top2 .rank-meta {
      color: rgba(31, 75, 114, .7)
    }

    .rank-item.top1 .rank-time,
    .rank-item.top2 .rank-time {
      background: rgba(31, 75, 114, .12);
      color: #1E2D3C
    }

    /* Found Words List */
    #found-words-list {
      width: 90%;
      max-width: 300px;
      max-height: 200px;
      overflow-y: auto;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      padding: 10px;
      margin-bottom: 15px;
      text-align: left;
    }

    .found-word-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 5px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.2);
      font-size: 14px;
    }

    .found-word-item:last-child {
      border-bottom: none;
    }

    .found-word-kana {
      font-weight: bold;
      color: #ffd700;
    }

    .found-word-en {
      color: #ddd;
      font-size: 12px;
    }

    .music-toggle {
      position: absolute;
      top: 16px;
      right: 16px;
      z-index: 1;
      width: 57px;
      height: 57px;
      padding: 0;
      border: none;
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #f2fbff;
      cursor: pointer;
    }

    .music-toggle svg {
      width: 31px;
      height: 31px;
      display: flex;
      flex-wrap: wrap;
      font-family: "SF Pro Display", -apple-system, BlinkMacSystemFont, sans-serif;
    }

    .music-toggle .music-icon {
      width: 31px;
      height: 31px;
      object-fit: contain;
    }

    .music-toggle.is-off {
      color: rgba(242, 251, 255, 0.65);
    }

    .music-toggle.is-on .sound-wave {
      animation: wavePulse 1.8s ease-in-out infinite;
      opacity: 0.9;
    }

    .music-toggle.is-on .sound-wave.wave-2 {
      animation-delay: 0.2s;
    }

    .music-toggle.is-on .sound-wave.wave-3 {
      animation-delay: 0.4s;
    }

    .music-toggle.is-off .sound-wave,
    .music-toggle.is-off .slash {
      animation: none;
    }

    .music-toggle.is-on .slash {
      opacity: 0;
    }

    .music-toggle.is-off .sound-wave {
      opacity: 0;
    }

    .music-toggle.is-off .slash {
      opacity: 1;
    }

    .music-toggle:active {
      transform: scale(0.96);
    }

    #music-toggle-start {
      background-color: unset;
      background: unset;
      background-image: none;
      box-shadow: none;
      top: 100px;
      right: -55px;
      left: unset;
      width: 68px;
      height: 68px;
    }

    #music-toggle-start .music-icon {
      width: 55px;
      height: 55px;
    }

    #music-toggle-game {
      display: none;  /* 已迁移到 canvas，隐藏 HTML 按钮 */
    }

    #music-toggle-result {
      box-shadow: none;
      top: 100px;
      right: -55px;
      left: unset;
      width: 68px;
      height: 68px;
    }

    #music-toggle-result .music-icon {
      width: 55px;
      height: 55px;
    }

    @keyframes wavePulse {
      0% {
        opacity: 0.6;
      }
      50% {
        opacity: 1;
      }
      100% {
        opacity: 0.6;
      }
    }

    /* My Words Modal */
    #my-words-modal {
      position: fixed;
      inset: 0;
      z-index: 1001;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .my-words-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.65);
      backdrop-filter: blur(4px);
    }

    .my-words-content {
      position: relative;
      width: 90%;
      max-width: 500px;
      height: 80vh;
      background: rgba(255, 255, 255, 0.95);
      border-radius: 16px;
      display: flex;
      flex-direction: column;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      overflow: hidden;
    }

    .my-words-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 24px;
      border-bottom: 1px solid rgba(0, 0, 0, 0.1);
      background: rgba(255, 255, 255, 0.9);
    }

    .my-words-header h2 {
      margin: 0;
      font-size: 24px;
      color: #1E2D3C;
      font-weight: 700;
    }

    .my-words-close {
      width: 36px;
      height: 36px;
      border: none;
      background: rgba(0, 0, 0, 0.06);
      border-radius: 50%;
      font-size: 24px;
      line-height: 1;
      color: #1E2D3C;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      box-shadow: none;
    }

    .my-words-close:hover {
      background: rgba(0, 0, 0, 0.1);
    }

    .my-words-close:active {
      transform: scale(0.95);
    }

    .my-words-tabs {
      display: flex;
      gap: 0;
      border-bottom: 1px solid rgba(0, 0, 0, 0.1);
      background: rgba(255, 255, 255, 0.95);
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }

    .my-words-tabs::-webkit-scrollbar {
      display: none;
    }

    .my-words-tab {
      padding: 12px 20px;
      border: none;
      background: transparent;
      color: rgba(31, 75, 114, 0.6);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
      position: relative;
    }

    .my-words-tab:hover {
      background: rgba(0, 0, 0, 0.03);
      color: rgba(31, 75, 114, 0.8);
    }

    .my-words-tab.active {
      color: #1E2D3C;
      font-weight: 600;
      border-bottom-color: #1EA0F2;
      background: rgba(30, 160, 242, 0.05);
    }

    .my-words-tab:active {
      transform: scale(0.98);
    }

    .my-words-list-container {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 16px;
    }

    .my-words-loading {
      text-align: center;
      padding: 40px 20px;
      color: rgba(31, 75, 114, 0.7);
      font-size: 14px;
    }

    .my-words-list {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .my-word-item-wrapper {
      position: relative;
      margin-bottom: 8px;
      overflow: hidden;
      border-radius: 8px;
    }

    .my-word-item-wrapper:last-child {
      margin-bottom: 0;
    }

    .my-word-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 16px;
      border-bottom: 1px solid rgba(0, 0, 0, 0.1);
      background: rgba(255, 255, 255, 0.6);
      border-radius: 8px;
      transition: transform 0.3s ease-out, background-color 0.2s, border-color 0.2s;
      position: relative;
      z-index: 1;
      touch-action: pan-y;
    }

    .my-word-item-wrapper.swiping .my-word-item {
      transition: transform 0.1s ease-out;
    }

    .my-word-item:last-child {
      margin-bottom: 0;
      border-bottom: none;
    }

    .my-word-item.highlighted {
      background: rgba(255, 215, 0, 0.25);
      border: 1px solid rgba(255, 215, 0, 0.5);
    }

    .my-word-content {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex: 1;
      gap: 8px;
      min-width: 0;
    }

    .my-word-kana {
      font-weight: bold;
      color: #ffd700;
      font-size: 16px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .my-word-speaker-btn {
      width: 20px;
      height: 20px;
      border: none;
      background: transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      border-radius: 50%;
      transition: background-color 0.2s, transform 0.1s, color 0.2s;
      flex-shrink: 0;
      box-shadow: none;
      color: #1F6FCF;
    }

    .my-word-speaker-btn:hover {
      background: rgba(31, 111, 207, 0.1);
      color: #1F6FCF;
    }

    .my-word-speaker-btn:active {
      transform: scale(0.95);
    }

    .my-word-speaker-btn svg {
      width: 16px;
      height: 16px;
      fill: none;
      stroke: currentColor;
      stroke-width: 1.5;
    }

    .my-word-en-wrapper {
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 1;
      min-width: 0;
      justify-content: flex-end;
      margin-right: 8px;
    }

    .my-word-en {
      color: rgba(31, 75, 114, 0.7);
      font-size: 14px;
      text-align: right;
      flex-shrink: 0;
    }

    .my-word-favorite-btn {
      width: 24px;
      height: 24px;
      border: none;
      background: transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      border-radius: 50%;
      transition: background-color 0.2s, transform 0.1s, color 0.2s;
      flex-shrink: 0;
      box-shadow: none;
      color: rgba(31, 75, 114, 0.4);
    }

    .my-word-favorite-btn:hover {
      background: rgba(0, 0, 0, 0.05);
      color: rgba(31, 75, 114, 0.6);
    }

    .my-word-favorite-btn:active {
      transform: scale(0.95);
    }

    .my-word-favorite-btn.active {
      color: #ffd700;
    }

    .my-word-favorite-btn svg {
      width: 18px;
      height: 18px;
      fill: none;
      stroke: currentColor;
      stroke-width: 1.5;
    }

    .my-word-favorite-btn.active svg {
      fill: currentColor;
    }

    .my-word-delete-btn {
      position: absolute;
      right: 0;
      top: 0;
      bottom: 0;
      width: 80px;
      background: #ff4444;
      border: none;
      color: white;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 0;
      border-radius: 0 8px 8px 0;
      box-shadow: none;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }

    .my-word-item-wrapper.swiping .my-word-delete-btn {
      opacity: 1;
      pointer-events: auto;
    }

    .my-word-delete-btn:hover {
      background: #ff3333;
    }

    .my-word-delete-btn:active {
      background: #ff2222;
    }

    .my-word-delete-btn svg {
      width: 20px;
      height: 20px;
      fill: currentColor;
      stroke: currentColor;
      stroke-width: 1.5;
    }

    .my-word-highlight-btn {
      width: 32px;
      height: 32px;
      border: none;
      background: transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      border-radius: 50%;
      transition: background-color 0.2s;
      flex-shrink: 0;
      box-shadow: none;
    }

    .my-word-highlight-btn:hover {
      background: rgba(0, 0, 0, 0.05);
    }

    .my-word-highlight-btn.active {
      color: #ffd700;
    }

    .my-word-highlight-btn svg {
      width: 20px;
      height: 20px;
      fill: currentColor;
    }

    .my-words-empty {
      text-align: center;
      padding: 40px 20px;
      color: rgba(31, 75, 114, 0.7);
      font-size: 14px;
    }
  </style>
</head>

<body>
  <audio id="bgm" src="assets/潮汐小旅行.mp3" preload="auto" loop playsinline></audio>

  <!-- 启动页（默认唯一可见） -->
  <div id="start-screen" class="is-flex">
    <button id="music-toggle-start" class="music-toggle is-on" aria-pressed="true" aria-label="Toggle music">
      <img src="fish_assets/open.png" alt="Music" class="music-icon music-icon-on" style="display: block;">
      <img src="fish_assets/mute.png" alt="Music" class="music-icon music-icon-off" style="display: none;">
    </button>
    <h1> Words Fishing</h1>
    <button id="start-btn">Start</button>
    <button id="my-words-btn">My Words</button>
    <button id="share-btn">Share</button>
  </div>

  <!-- Loading / 游戏 / 结算 / 排行榜（都默认隐藏） -->
  <div id="loading" class="is-hidden">
    <div class="loader"></div>
    <div>loading</div>
  </div>

  <div id="game-wrapper" class="is-hidden">
    <button id="game-back" aria-label="返回">&lt;</button>
    <button id="music-toggle-game" class="music-toggle is-on" aria-pressed="true" aria-label="Toggle music">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M3 9v6h4l5 4V5L7 9H3z" fill="currentColor"></path>
        <path class="sound-wave wave-1" d="M15.5 8.5a4.5 4.5 0 0 1 0 7" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"></path>
        <path class="sound-wave wave-2" d="M18 6a7 7 0 0 1 0 12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"></path>
        <path class="sound-wave wave-3" d="M20.5 4a9.5 9.5 0 0 1 0 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"></path>
        <path class="slash" d="M4 20L20 4" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"></path>
      </svg>
    </button>
    <iframe id="game-frame" src=""></iframe>
  </div>

  <div id="result-screen" class="is-hidden">
    <button id="music-toggle-result" class="music-toggle is-on" aria-pressed="true" aria-label="Toggle music">

  <script>
    /* 工具：状态切换（只留一个层可见） */
    const LAYERS = ["start-screen", "loading", "game-wrapper", "result-screen", "rank-screen"];
    function showFlex(id) { hideAll(); document.getElementById(id).classList.remove("is-hidden"); document.getElementById(id).classList.add("is-flex"); }
    function showBlock(id) { hideAll(); document.getElementById(id).classList.remove("is-hidden"); document.getElementById(id).classList.add("is-block"); }
    function hideAll() {
      LAYERS.forEach(k => {
        const el = document.getElementById(k);
        el.classList.remove("is-flex", "is-block");
        el.classList.add("is-hidden");
      });
    }

    /* DOM 引用 */
    const startBtn = document.getElementById("start-btn");
    const rankBtn = document.getElementById("rank-btn");
    const rankBack = document.getElementById("rank-back");
    const gameBack = document.getElementById("game-back");
    const shareBtn = document.getElementById("share-btn");
    const share2Btn = document.getElementById("share2-btn");
    const nextBtn = document.getElementById("next-btn");
    const easierModeBtn = document.getElementById("easier-mode-btn");
    const homeBtn = document.getElementById("home-btn");
    const myWordsBtn = document.getElementById("my-words-btn");
    const myWordsModal = document.getElementById("my-words-modal");
    const myWordsClose = document.getElementById("my-words-close");
    const myWordsOverlay = document.getElementById("my-words-overlay");
    const myWordsTabs = document.getElementById("my-words-tabs");
    const myWordsList = document.getElementById("my-words-list");
    const myWordsLoading = document.getElementById("my-words-loading");
    const gameFrame = document.getElementById("game-frame");
    const bgm = document.getElementById("bgm");
    
    // 监听游戏iframe加载完成，发送解锁音频消息
    if (gameFrame) {
      gameFrame.addEventListener('load', () => {
        // 通知游戏iframe解锁音频上下文
        if (gameFrame.contentWindow) {
          gameFrame.contentWindow.postMessage({
            action: "unlockSpeech"
          }, "*");
        }
      });
    }
    const musicToggleStart = document.getElementById("music-toggle-start");
    const musicToggleGame = document.getElementById("music-toggle-game");
    const musicToggleResult = document.getElementById("music-toggle-result");
    const resultTitle = document.getElementById("result-title");
    const rankList = document.getElementById("rank-list");
    let latestScore = 0;
    let latestLevel = null;
    let latestLevelString = null;
    let fireworksTimeout = null;
    const DEFAULT_AVATAR = "assets/handy.png";
    let bgmEnabled = true;
    let bgmResumeBound = false;
    if (bgm) {
      bgm.volume = 0.35;
      bgm.muted = false;
    }

    // 更新游戏音乐按钮位置（已移除，因为改为 absolute 定位后不再需要动态计算）
    // function updateMusicToggleGamePosition() { ... }

    function triggerFireworks() {
      if (window.fireworksEffect && typeof window.fireworksEffect.burst === "function") {
        window.fireworksEffect.burst(5);
        if (fireworksTimeout) {
          clearTimeout(fireworksTimeout);
        }
        fireworksTimeout = setTimeout(() => {
          fireworksTimeout = null;
          if (window.fireworksEffect && typeof window.fireworksEffect.burst === "function") {
            window.fireworksEffect.burst(5);
          }
        }, 900);
      }
    }

    function stopFireworks() {
      if (window.fireworksEffect && typeof window.fireworksEffect.stop === "function") {
        window.fireworksEffect.stop();
      }
      if (fireworksTimeout) {
        clearTimeout(fireworksTimeout);
        fireworksTimeout = null;
      }
    }

    function escapeHtml(value) {
      if (value === undefined || value === null) {
        return "";
      }
      return String(value).replace(/[&<>"']/g, function (match) {
        switch (match) {
          case "&": return "&amp;";
          case "<": return "&lt;";
          case ">": return "&gt;";
          case '"': return "&quot;";
          case "'": return "&#39;";
          default: return match;
        }
      });
    }

    function escapeAttribute(value) {
      return escapeHtml(value).replace(/`/g, "&#96;");
    }

    // Language mapping constants (from games/game.js)
    const LANG_MAP = {
      "日本語": { key: "furigana", locale: "ja-JP" },
      "English": { key: "english", locale: "en-US" },
      "中文": { key: "chinese", locale: "zh-CN" },
      "한국어": { key: "korean", locale: "ko-KR" },
      "Español": { key: "spanish", locale: "es-ES" },
      "Français": { key: "french", locale: "fr-FR" }
    };

    const CHAR_SETS = {
      "日本語": "あいうえおかきくけこさしすせそたちつてとなにぬねのはひふへほまみむめもやゆよらりるれろわをん",
      "English": "abcdefghijklmnopqrstuvwxyz",
      "中文": "的一是在不了有和人这中大为上个国我以要他时来用们生到作地于出就分对成会可主发年动同工也能下过子说产种面而方后多定行学法所民得经十三之进着等部度家电力里如水化高自二理起小物现实主义量都两体制机当使点从业本去把性好应开它合还因由其些然前外天政四日那社义事平形相全表间样与关各重新线内数正心反你明看原又么利比或但质气第向道命此变条只没结解问意建月公无系军很情者最立代想已通并提直题党程展五果料象员革位入常文总次品式活设及管特件长求老头基资边流路级少图山统接知较将组见计别她手角期根论运农指几九区强放决西被干做必战先回则任取完热志反目华快难早照鱼水",
      "한국어": "가나다라마바사아자차카타파하거너더러머버서어저처커터퍼허고노도로모보소오조초코토포호구누두루무부수우주추쿠투푸후그느드르므브스으즈츠크트프흐기니디리미비시이지치키티피히애에얘예와왜외워웨위의",
      "Español": "abcdefghijklmnopqrstuvwxyzñáéíóúü",
      "Français": "abcdefghijklmnopqrstuvwxyzàâçéèêëîïôûùüÿ"
    };

    // Language code mapping for Tab display
    const LANG_CODE_MAP = {
      "中文": "CN",
      "日本語": "JA",
      "English": "EN",
      "한국어": "KR",
      "Español": "ES",
      "Français": "FR"
    };

    // Get language code from language name
    function getLangCode(langName) {
      return LANG_CODE_MAP[langName] || langName;
    }

    // Normalize language pair to ensure consistent representation
    // CN ⇄ EN and EN ⇄ CN should be treated as the same pair
    function normalizeLanguagePair(learningLang, baseLang) {
      const code1 = getLangCode(learningLang || "日本語");
      const code2 = getLangCode(baseLang || "English");
      // Sort codes alphabetically to ensure consistent representation
      const codes = [code1, code2].sort();
      return codes[0] + " ⇄ " + codes[1];
    }

    // Get word text for a specific language (from games/game.js)
    function getWordText(wordItem, langName, strictValidation) {
      if (strictValidation === undefined) strictValidation = true;
      const config = LANG_MAP[langName];
      if (!config) return "";
      // 优先使用指定语言的字段，如果不存在或为空，返回空字符串（不回退到其他语言）
      let text = wordItem[config.key];
      if (!text || (typeof text === 'string' && text.trim() === "")) {
        return ""; // 返回空字符串，让调用者知道这个单词没有该语言的翻译
      }
      // Clean up: take first part before delimiters
      text = text.split(/[,;\/]/)[0];
      text = text.trim();
      
      // 验证文本是否真的包含指定语言的字符（防止使用回退值）
      const charSet = CHAR_SETS[langName] || "";
      if (charSet && text.length > 0) {
        // 如果是基础语言（提示文本），使用宽松验证
        if (!strictValidation) {
          // 对于基础语言，即使字符不完全匹配字符集，也返回文本（因为可能是有效的翻译）
          // 只做基本检查：如果文本完全由空格和标点组成，返回空字符串
          const hasContent = text.split('').some(function(char) {
            return !/[\s\.,;:!?\-\(\)\[\]{}]/.test(char);
          });
          if (!hasContent) {
            return "";
          }
          // 对于基础语言，直接返回文本，不进行严格的字符集验证
          return text;
        }
        
        // 学习语言使用严格验证（现有逻辑）
        // 检查文本中的字符是否主要属于指定语言字符集
        var validCharCount = 0;
        var totalCharCount = 0;
        
        text.split('').forEach(function(char) {
          // 跳过空格和标点符号
          if (/[\s\.,;:!?\-\(\)\[\]{}]/.test(char)) {
            return;
          }
          totalCharCount++;
          
          // 对于大小写敏感的语言（如英语），检查小写和大写
          if (langName === "English" || langName === "Español" || langName === "Français") {
            if (charSet.indexOf(char.toLowerCase()) !== -1 || charSet.indexOf(char.toUpperCase()) !== -1) {
              validCharCount++;
            }
          } else {
            // 对于其他语言，直接检查
            if (charSet.indexOf(char) !== -1) {
              validCharCount++;
            }
          }
        });
        
        // 如果文本中大部分字符都不属于指定语言字符集，说明这是回退值，返回空字符串
        // 要求至少50%的字符属于指定语言字符集
        if (totalCharCount > 0 && validCharCount / totalCharCount < 0.5) {
          return "";
        }
      }
      
      return text;
    }

    // Speech synthesis function (from games/game.js)
    let voices = [];
    let speechUnlocked = false;

    function loadVoices() {
      if ('speechSynthesis' in window) {
        voices = window.speechSynthesis.getVoices();
      }
    }

    if ('speechSynthesis' in window) {
      loadVoices();
      if (window.speechSynthesis.onvoiceschanged !== undefined) {
        window.speechSynthesis.onvoiceschanged = loadVoices;
      }
    }

    function unlockSpeech() {
      if (speechUnlocked || !('speechSynthesis' in window)) return;

      // Play silent utterance to unlock audio context on mobile
      // 必须在用户交互事件中调用才有效
      try {
        const utterance = new SpeechSynthesisUtterance('');
        utterance.volume = 0;
        utterance.rate = 10; // 快速播放，几乎瞬间完成
        utterance.pitch = 0;
        utterance.onend = () => {
          // 解锁完成
        };
        utterance.onerror = () => {
          // 忽略错误，解锁可能失败但不影响后续使用
        };
        window.speechSynthesis.speak(utterance);
        speechUnlocked = true;
      } catch (e) {
        console.warn('[speech] unlock failed', e);
        // 即使失败也标记为已尝试，避免重复尝试
        speechUnlocked = true;
      }
    }

    function speak(text, langName = "日本語") {
      if (!('speechSynthesis' in window)) return;

      // 确保音频上下文已解锁（每次调用时都尝试，以防之前解锁失败）
      unlockSpeech();

      // Resume if paused (fix for some Android/Chrome versions)
      if (window.speechSynthesis.paused) {
        window.speechSynthesis.resume();
      }

      window.speechSynthesis.cancel();

      const utterance = new SpeechSynthesisUtterance(text);

      const mapItem = LANG_MAP[langName] || LANG_MAP["日本語"];
      const targetLocale = mapItem.locale;

      utterance.lang = targetLocale;
      utterance.rate = 1.0;

      // Try to select a voice explicitly
      if (voices.length === 0) loadVoices();
      // Find voice matching locale
      const voice = voices.find(v => v.lang === targetLocale || v.lang.startsWith(targetLocale.split('-')[0]));
      if (voice) {
        utterance.voice = voice;
      }

      window.speechSynthesis.speak(utterance);
    }

    function getInitial(name) {
      var trimmed = (name || "").trim();
      if (!trimmed) return "?";
      return trimmed.charAt(0).toUpperCase();
    }

    function formatCompletion(ms) {
      var value = Number(ms);
      if (!Number.isFinite(value) || value <= 0) {
        return "";
      }
      var seconds = value / 1000;
      if (seconds >= 60) {
        var minutes = Math.floor(seconds / 60);
        var remainder = Math.round((seconds % 60) * 10) / 10;
        var remainderStr = remainder < 10 ? "0" + remainder.toFixed(1) : remainder.toFixed(1);
        return minutes + "m " + remainderStr + "s";
      }
      var formatted = seconds.toFixed(1);
      return formatted.replace(/\.0$/, "") + "s";
    }

    function renderRankItem(item, index) {
      var rankClass = index === 0 ? "top1" : index === 1 ? "top2" : index === 2 ? "top3" : "";
      var avatarSrc = item.avatar ? item.avatar : DEFAULT_AVATAR;
      var avatarHtml = '<img class="rank-avatar" src="' + escapeAttribute(avatarSrc) + '" alt="' + escapeAttribute(item.nickname || "Player") + '" loading="lazy" />';
      var metaParts = [];
      if (item.isVip) {
        metaParts.push('<span class="rank-vip">VIP</span>');
      }
      var completion = formatCompletion(item.completionTimeMs);
      if (completion) {
        metaParts.push('<span class="rank-time">' + escapeHtml(completion) + "</span>");
      }
      var metaHtml = metaParts.join("");
      var scoreValue = Number(item.score);
      var scoreDisplay = Number.isFinite(scoreValue) ? scoreValue : 0;
      return '<div class="rank-item ' + rankClass + '">' +
        '<div class="rank-main">' +
        '<span class="rank-index">' + (index + 1) + "</span>" +
        avatarHtml +
        '<div class="rank-info">' +
        '<div class="rank-name">' + escapeHtml(item.nickname) + "</div>" +
        '<div class="rank-meta">' + metaHtml + "</div>" +
        "</div>" +
        "</div>" +
        '<div class="rank-score">' + escapeHtml(scoreDisplay) + "</div>" +
        "</div>";
    }

    function renderLeaderboard(list) {
      if (!Array.isArray(list) || list.length === 0) {
        rankList.innerHTML = '<div class="rank-empty">暂时没有排行榜数据</div>';
        return;
      }
      rankList.innerHTML = list.map(function (item, index) {
        return renderRankItem(item, index);
      }).join("");
    }

    function loadLeaderboard() {
      rankList.innerHTML = '<div class="rank-loading">正在加载排行榜...</div>';
      var service = window.gameDataService;
      var loader;
      if (service && typeof service.fetchLeaderboard === "function") {
        loader = service.fetchLeaderboard();
      } else {
        loader = Promise.resolve([]);
      }
      loader.then(function (list) {
        if ((!list || !list.length) && service && typeof service.getFallbackLeaderboard === "function") {
          list = service.getFallbackLeaderboard();
        }
        renderLeaderboard(list);
      }).catch(function (error) {
        console.warn("[leaderboard] load failed", error);
        rankList.innerHTML = '<div class="rank-error">排行榜加载失败，请稍后再试。</div>';
      });
    }

    /* 首屏强制态（防止某些浏览器闪现浮层） */
    window.addEventListener("DOMContentLoaded", () => {
      hideAll();
      showFlex("start-screen");   // 只显示首页
      updateMusicButtons();
      tryPlayBgm();
      bindBgmResumeOnGesture();
    });

    /* 开始游戏 */
    startBtn.onclick = () => {
      // 立即解锁音频上下文（必须在用户交互时立即调用）
      unlockSpeech();
      
      hideAll();
      showFlex("loading");
      stopFireworks();
      tryPlayBgm();
      setTimeout(() => {
        showBlock("game-wrapper");
        gameFrame.src = "./games/game.html";
      }, 200);
      if (window.appCommunication && typeof window.appCommunication.sendMessageToApp === "function") {
        window.appCommunication.sendMessageToApp({
          type: "gameStart"
        });
      }
    };

    /* 排行榜 */
    if (rankBtn) {
      rankBtn.classList.add("is-hidden");
      rankBtn.onclick = () => {
        hideAll();
        stopFireworks();
        showFlex("rank-screen");
        rankList.scrollTop = 0;
        loadLeaderboard();
      };
    }
    rankBack.onclick = () => {
      hideAll();
      showFlex("start-screen");
      stopFireworks();
    };
    gameBack.onclick = () => {
      hideAll();
      showFlex("start-screen");
      stopFireworks();
      tryPlayBgm();
    };

    /* My Words Modal */
    function showMyWordsModal() {
      myWordsModal.classList.remove("is-hidden");
      myWordsModal.style.display = "flex";
      loadMyWords();
    }

    function hideMyWordsModal() {
      myWordsModal.classList.add("is-hidden");
      myWordsModal.style.display = "none";
    }

    // Current selected tab for filtering words
    let currentSelectedTab = null;

    function renderWordsList(words, selectedTab) {
      // 每次渲染前从存储同步收藏状态，避免切换 Tab 后状态回退
      const wordsWithHighlight = (words || []).map(function(word) {
        const wordId = word.id || ((word.furigana || "") + "|" + (word.english || ""));
        let highlightState = !!word.isHighlighted;
        if (window.instantDBService && typeof window.instantDBService.isWordHighlighted === "function" && wordId) {
          try {
            highlightState = window.instantDBService.isWordHighlighted(wordId);
          } catch (err) {
            console.warn("[myWords] highlight sync failed", err);
          }
        }
        return Object.assign({}, word, { id: wordId, isHighlighted: highlightState });
      });

      if (!wordsWithHighlight || wordsWithHighlight.length === 0) {
        myWordsList.innerHTML = '<div class="my-words-empty">No words found. Play games to collect words!</div>';
        return;
      }

      // Filter words by selected tab
      const filteredWords = wordsWithHighlight.filter(function(word) {
        const wordLearningLang = word.learningLang || "日本語";
        const wordBaseLang = word.baseLang || "English";
        const wordPair = normalizeLanguagePair(wordLearningLang, wordBaseLang);
        return wordPair === selectedTab;
      });

      if (filteredWords.length === 0) {
        myWordsList.innerHTML = '<div class="my-words-empty">No words in this language pair.</div>';
        return;
      }

      // Sort by creation date (newest first)
      filteredWords.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));

      myWordsList.innerHTML = filteredWords.map(function(word) {
        const highlightedClass = word.isHighlighted ? "highlighted" : "";
        const wordId = escapeAttribute(word.id || "");
        
        // Get learning and base languages from word data (with backward compatibility)
        const wordLearningLang = word.learningLang || "日本語";
        const wordBaseLang = word.baseLang || "English";
        
        // Use getWordText to get text in the correct languages
        // Fallback to furigana/english for backward compatibility
        var learningText = getWordText(word, wordLearningLang);
        if (!learningText) {
          learningText = word.furigana || "";
        }
        var baseText = getWordText(word, wordBaseLang, false);
        if (!baseText) {
          baseText = word.english || "";
        }
        
        const learningTextEscaped = escapeHtml(learningText);
        const baseTextEscaped = escapeHtml(baseText);
        const ariaLabel = word.isHighlighted ? "Remove highlight" : "Highlight word";
        const activeClass = word.isHighlighted ? "active" : "";
        
        return '<div class="my-word-item-wrapper" data-word-id="' + wordId + '">' +
          '<div class="my-word-item ' + highlightedClass + '" data-word-id="' + wordId + '">' +
          '<div class="my-word-content">' +
          '<span class="my-word-kana">' + learningTextEscaped +
          '<button class="my-word-speaker-btn" ' +
          'data-word-id="' + wordId + '" ' +
          'data-learning-lang="' + escapeAttribute(wordLearningLang) + '" ' +
          'aria-label="Pronounce word">' +
          '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">' +
          '<path d="M11 5L6 9H2v6h4l5 4V5zM19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/>' +
          '</svg>' +
          '</button>' +
          '</span>' +
          '<div class="my-word-en-wrapper">' +
          '<span class="my-word-en">' + baseTextEscaped + '</span>' +
          '<button class="my-word-favorite-btn ' + activeClass + '" ' +
          'data-word-id="' + wordId + '" ' +
          'aria-label="' + escapeAttribute(ariaLabel) + '">' +
          '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">' +
          '<path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>' +
          '</svg>' +
          '</button>' +
          '</div>' +
          '</div>' +
          '</div>' +
          '<button class="my-word-delete-btn" data-word-id="' + wordId + '" aria-label="Delete word">' +
          '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">' +
          '<path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2M10 11v6M14 11v6"/>' +
          '</svg>' +
          '</button>' +
          '</div>';
      }).join("");

      // 绑定发音按钮点击事件（学习语言旁边的扬声器按钮）
      myWordsList.querySelectorAll(".my-word-speaker-btn").forEach((btn, index) => {
        btn.addEventListener("click", function(e) {
          e.stopPropagation();
          const wordId = this.getAttribute("data-word-id");
          const learningLang = this.getAttribute("data-learning-lang") || "日本語";
          
          // 找到对应的单词数据
          const wordData = filteredWords.find(w => {
            const wId = w.id || ((w.furigana || "") + "|" + (w.english || ""));
            return wId === wordId;
          });
          
          if (wordData) {
            const wordText = getWordText(wordData, learningLang);
            if (wordText) {
              speak(wordText, learningLang);
            }
          }
        });
      });

      // 绑定收藏按钮点击事件（基础语言旁边的星星按钮）
      myWordsList.querySelectorAll(".my-word-favorite-btn").forEach(btn => {
        btn.addEventListener("click", function(e) {
          e.stopPropagation();
          const wordId = this.getAttribute("data-word-id");
          const wordItem = this.closest(".my-word-item");
          const isCurrentlyHighlighted = wordItem.classList.contains("highlighted");
          const newHighlightState = !isCurrentlyHighlighted;

          // 更新数据库
          window.instantDBService.toggleWordHighlight(wordId, newHighlightState).then(function() {
            // 更新UI
            wordItem.classList.toggle("highlighted", newHighlightState);
            // 更新按钮的状态
            this.classList.toggle("active", newHighlightState);
          }.bind(this)).catch(function(error) {
            console.warn("[myWords] Failed to toggle highlight", error);
          });
        });
      });

      // 初始化滑动删除功能
      initSwipeToDelete();
    }

    // 滑动删除功能
    let swipeState = {
      startX: 0,
      startY: 0,
      currentX: 0,
      currentY: 0,
      isSwiping: false,
      currentWrapper: null,
      deleteButtonWidth: 80,
      deleteThreshold: 56  // 删除按钮宽度的70%，滑动超过此距离直接删除
    };

    function initSwipeToDelete() {
      const wrappers = myWordsList.querySelectorAll(".my-word-item-wrapper");
      
      wrappers.forEach(wrapper => {
        const item = wrapper.querySelector(".my-word-item");
        let touchStartX = 0;
        let touchStartY = 0;
        let isDragging = false;
        let startTime = 0;

        // 触摸事件（移动端）
        item.addEventListener("touchstart", function(e) {
          touchStartX = e.touches[0].clientX;
          touchStartY = e.touches[0].clientY;
          startTime = Date.now();
          isDragging = false;
          swipeState.currentWrapper = wrapper;
        }, { passive: true });

        item.addEventListener("touchmove", function(e) {
          if (!touchStartX) return;
          
          const touchX = e.touches[0].clientX;
          const touchY = e.touches[0].clientY;
          const deltaX = touchX - touchStartX;
          const deltaY = touchY - touchStartY;

          // 判断是否为水平滑动
          if (Math.abs(deltaX) > Math.abs(deltaY) && Math.abs(deltaX) > 10) {
            isDragging = true;
            e.preventDefault();
            
            // 只允许向左滑动
            if (deltaX < 0) {
              const translateX = Math.max(deltaX, -swipeState.deleteButtonWidth);
              item.style.transform = `translateX(${translateX}px)`;
              wrapper.classList.add("swiping");
            }
          }
        }, { passive: false });

        item.addEventListener("touchend", function(e) {
          if (!touchStartX) return;
          
          const touchX = e.changedTouches[0].clientX;
          const deltaX = touchX - touchStartX;
          const timeDelta = Date.now() - startTime;

          if (isDragging && deltaX < 0) {
            // 如果滑动超过删除阈值，直接删除单词
            if (Math.abs(deltaX) >= swipeState.deleteThreshold) {
              const wordId = wrapper.getAttribute("data-word-id");
              if (wordId) {
                deleteWord(wordId);
              }
            } else if (Math.abs(deltaX) > swipeState.deleteButtonWidth / 2 || 
                (Math.abs(deltaX) > 30 && timeDelta < 300)) {
              // 如果滑动超过一半或速度足够快，显示删除按钮
              item.style.transform = `translateX(-${swipeState.deleteButtonWidth}px)`;
              // 保持 swiping 类以显示删除按钮
            } else {
              // 否则恢复原状
              item.style.transform = "translateX(0)";
              wrapper.classList.remove("swiping");
            }
          } else {
            item.style.transform = "translateX(0)";
            wrapper.classList.remove("swiping");
          }

          touchStartX = 0;
          isDragging = false;
        }, { passive: true });

        // 鼠标事件（桌面端）
        item.addEventListener("mousedown", function(e) {
          touchStartX = e.clientX;
          touchStartY = e.clientY;
          startTime = Date.now();
          isDragging = false;
          swipeState.currentWrapper = wrapper;
        });

        item.addEventListener("mousemove", function(e) {
          if (!touchStartX || e.buttons !== 1) return;
          
          const deltaX = e.clientX - touchStartX;
          const deltaY = e.clientY - touchStartY;

          // 判断是否为水平滑动
          if (Math.abs(deltaX) > Math.abs(deltaY) && Math.abs(deltaX) > 10) {
            isDragging = true;
            
            // 只允许向左滑动
            if (deltaX < 0) {
              const translateX = Math.max(deltaX, -swipeState.deleteButtonWidth);
              item.style.transform = `translateX(${translateX}px)`;
              wrapper.classList.add("swiping");
            }
          }
        });

        item.addEventListener("mouseup", function(e) {
          if (!touchStartX) return;
          
          const deltaX = e.clientX - touchStartX;
          const timeDelta = Date.now() - startTime;

          if (isDragging && deltaX < 0) {
            // 如果滑动超过删除阈值，直接删除单词
            if (Math.abs(deltaX) >= swipeState.deleteThreshold) {
              const wordId = wrapper.getAttribute("data-word-id");
              if (wordId) {
                deleteWord(wordId);
              }
            } else if (Math.abs(deltaX) > swipeState.deleteButtonWidth / 2 || 
                (Math.abs(deltaX) > 30 && timeDelta < 300)) {
              // 如果滑动超过一半或速度足够快，显示删除按钮
              item.style.transform = `translateX(-${swipeState.deleteButtonWidth}px)`;
              // 保持 swiping 类以显示删除按钮
            } else {
              // 否则恢复原状
              item.style.transform = "translateX(0)";
              wrapper.classList.remove("swiping");
            }
          } else {
            item.style.transform = "translateX(0)";
            wrapper.classList.remove("swiping");
          }

          touchStartX = 0;
          isDragging = false;
        });

        item.addEventListener("mouseleave", function(e) {
          if (isDragging && touchStartX) {
            const deltaX = e.clientX - touchStartX;
            if (deltaX < 0) {
              // 如果滑动超过删除阈值，直接删除单词
              if (Math.abs(deltaX) >= swipeState.deleteThreshold) {
                const wordId = wrapper.getAttribute("data-word-id");
                if (wordId) {
                  deleteWord(wordId);
                }
              } else if (Math.abs(deltaX) > swipeState.deleteButtonWidth / 2) {
                // 如果滑动超过一半，显示删除按钮
                item.style.transform = `translateX(-${swipeState.deleteButtonWidth}px)`;
                // 保持 swiping 类以显示删除按钮
              } else {
                item.style.transform = "translateX(0)";
                wrapper.classList.remove("swiping");
              }
            } else {
              item.style.transform = "translateX(0)";
              wrapper.classList.remove("swiping");
            }
            touchStartX = 0;
            isDragging = false;
          }
        });
      });

      // 绑定删除按钮点击事件
      myWordsList.querySelectorAll(".my-word-delete-btn").forEach(btn => {
        btn.addEventListener("click", function(e) {
          e.stopPropagation();
          const wordId = this.getAttribute("data-word-id");
          deleteWord(wordId);
        });
      });

      // 点击其他地方时关闭已打开的删除按钮
      document.addEventListener("click", function(e) {
        if (!e.target.closest(".my-word-item-wrapper")) {
          myWordsList.querySelectorAll(".my-word-item").forEach(item => {
            item.style.transform = "translateX(0)";
            item.closest(".my-word-item-wrapper").classList.remove("swiping");
          });
        }
      });
    }

    // 删除单词
    function deleteWord(wordId) {
      // 保存已删除的单词ID到localStorage
      const deletedWordsKey = 'fishwordlingo_deleted_words';
      let deletedWords = JSON.parse(localStorage.getItem(deletedWordsKey) || '[]');
      if (!deletedWords.includes(wordId)) {
        deletedWords.push(wordId);
        localStorage.setItem(deletedWordsKey, JSON.stringify(deletedWords));
      }

      // 从UI中移除
      const wrapper = myWordsList.querySelector(`.my-word-item-wrapper[data-word-id="${wordId}"]`);
      if (wrapper) {
        wrapper.style.transition = "transform 0.3s ease-out, opacity 0.3s ease-out";
        wrapper.style.transform = "translateX(-100%)";
        wrapper.style.opacity = "0";
        
        setTimeout(function() {
          wrapper.remove();
          
          // 检查是否还有单词，如果没有则显示空状态
          if (myWordsList.querySelectorAll(".my-word-item-wrapper").length === 0) {
            myWordsList.innerHTML = '<div class="my-words-empty">No words in this language pair.</div>';
          }
        }, 300);
      }
    }

    function loadMyWords() {
      if (!window.instantDBService) {
        myWordsLoading.textContent = "Database not available";
        return;
      }

      myWordsLoading.style.display = "block";
      myWordsList.innerHTML = "";
      myWordsTabs.innerHTML = "";

      const userId = window.instantDBService.getOrCreateUserId();
      window.instantDBService.getAllUserWords(userId).then(function(words) {
        myWordsLoading.style.display = "none";
        
        if (!words || words.length === 0) {
          myWordsList.innerHTML = '<div class="my-words-empty">No words found. Play games to collect words!</div>';
          myWordsTabs.innerHTML = "";
          return;
        }

        // 过滤已删除的单词
        const deletedWordsKey = 'fishwordlingo_deleted_words';
        const deletedWords = JSON.parse(localStorage.getItem(deletedWordsKey) || '[]');
        words = words.filter(word => {
          const wordId = (word.furigana || "") + "|" + (word.english || "");
          return !deletedWords.includes(wordId);
        });

        // 去重：相同 furigana 和 english 的单词只显示一次（保留最新的）
        const wordMap = new Map();
        words.forEach(word => {
          const key = (word.furigana || "") + "|" + (word.english || "");
          if (!wordMap.has(key) || new Date(word.createdAt) > new Date(wordMap.get(key).createdAt)) {
            wordMap.set(key, word);
          }
        });
        const uniqueWords = Array.from(wordMap.values());

        // Extract unique language pairs
        const languagePairs = new Set();
        uniqueWords.forEach(function(word) {
          const wordLearningLang = word.learningLang || "日本語";
          const wordBaseLang = word.baseLang || "English";
          const pair = normalizeLanguagePair(wordLearningLang, wordBaseLang);
          languagePairs.add(pair);
        });

        // Sort language pairs alphabetically
        const sortedPairs = Array.from(languagePairs).sort();

        // Generate tabs
        if (sortedPairs.length === 0) {
          myWordsTabs.innerHTML = "";
          myWordsList.innerHTML = '<div class="my-words-empty">No words found. Play games to collect words!</div>';
          return;
        }

        // Use saved selected tab or default to first tab
        const savedTab = localStorage.getItem('fishwordlingo_selected_tab');
        const defaultTab = savedTab && sortedPairs.includes(savedTab) ? savedTab : sortedPairs[0];
        currentSelectedTab = defaultTab;

        // Render tabs
        myWordsTabs.innerHTML = sortedPairs.map(function(pair) {
          const isActive = pair === currentSelectedTab ? "active" : "";
          return '<button class="my-words-tab ' + isActive + '" data-tab="' + escapeAttribute(pair) + '">' + 
                 escapeHtml(pair) + '</button>';
        }).join("");

        // Bind tab click events
        myWordsTabs.querySelectorAll(".my-words-tab").forEach(tab => {
          tab.addEventListener("click", function() {
            const tabPair = this.getAttribute("data-tab");
            currentSelectedTab = tabPair;
            
            // Update active state
            myWordsTabs.querySelectorAll(".my-words-tab").forEach(t => t.classList.remove("active"));
            this.classList.add("active");
            
            // Save selected tab
            localStorage.setItem('fishwordlingo_selected_tab', tabPair);
            
            // Re-render word list
            renderWordsList(uniqueWords, tabPair);
          });
        });

        // Render initial word list
        renderWordsList(uniqueWords, currentSelectedTab);
      }).catch(function(error) {
        console.warn("[myWords] Failed to load words", error);
        myWordsLoading.textContent = "Failed to load words. Please try again.";
      });
    }

    if (myWordsBtn) {
      myWordsBtn.onclick = () => {
        // 解锁音频上下文，确保发音功能可用
        unlockSpeech();
        showMyWordsModal();
      };
    }

    if (myWordsClose) {
      myWordsClose.onclick = () => {
        hideMyWordsModal();
      };
    }

    if (myWordsOverlay) {
      myWordsOverlay.onclick = () => {
        hideMyWordsModal();
      };
    }

    // 按 ESC 键关闭弹窗
    document.addEventListener("keydown", function(e) {
      if (e.key === "Escape" && myWordsModal && !myWordsModal.classList.contains("is-hidden")) {
        hideMyWordsModal();
      }
    });

    /* 分享 */
    shareBtn.onclick = () => {
      if (window.gameShare && typeof window.gameShare.shareHome === "function") {
        window.gameShare.shareHome();
      }
      if (window.appCommunication && typeof window.appCommunication.sendMessageToApp === "function") {
        window.appCommunication.sendMessageToApp({
          type: "shareTriggered",
          data: { source: "home" }
        });
      }
    };
    share2Btn.onclick = () => {
      if (window.gameShare && typeof window.gameShare.shareScore === "function") {
        window.gameShare.shareScore(latestScore, latestLevel);
      }
      if (window.appCommunication && typeof window.appCommunication.sendMessageToApp === "function") {
        window.appCommunication.sendMessageToApp({
          type: "shareTriggered",
          data: { source: "result", score: latestScore }
        });
      }
    };

    /* 结算页按钮 */
    homeBtn.onclick = () => {
      hideAll();
      showFlex("start-screen");
      stopFireworks();
      tryPlayBgm();
    };
    nextBtn.onclick = () => {
      // 解锁音频上下文，确保下一局游戏发音功能可用
      unlockSpeech();
      hideAll();
      showBlock("game-wrapper");
      stopFireworks();
      gameFrame.contentWindow?.postMessage({ action: "nextLevel" }, "*");
    };
    easierModeBtn.onclick = () => {
      // 解锁音频上下文，确保下一局游戏发音功能可用
      unlockSpeech();
      
      // Determine lower difficulty level
      let lowerLevel = null;
      if (latestLevelString === "Advanced") {
        lowerLevel = "Intermediate";
      } else if (latestLevelString === "Intermediate") {
        lowerLevel = "Beginner";
      }
      
      // Save lower level to localStorage
      if (lowerLevel) {
        try {
          localStorage.setItem('fishwordlingo_last_level', lowerLevel);
        } catch (e) {
          console.warn('[easierMode] Failed to save level to localStorage', e);
        }
      }
      
      // Start new game with lower difficulty
      hideAll();
      showBlock("game-wrapper");
      stopFireworks();
      gameFrame.contentWindow?.postMessage({ action: "nextLevel" }, "*");
    };

    /* 接收游戏过关消息 */
    window.addEventListener("message", (e) => {
      const data = e.data || {};
      if (data.action === "levelComplete") {
        latestScore = Number(data.score ?? 0) || 0;
        const completionTimeMs = Number.isFinite(Number(data.completionTimeMs)) ? Number(data.completionTimeMs) : null;
        const levelValue = Number.isFinite(Number(data.level)) ? Number(data.level) : null;
        const foundWords = Array.isArray(data.foundWords) ? data.foundWords : [];
        // Get language settings (fallback to default if not provided for backward compatibility)
        const learningLang = data.learningLang || "日本語";
        const baseLang = data.baseLang || "English";

        // Save level string for Easier Mode button logic
        latestLevelString = (typeof data.level === "string") ? data.level : null;
        latestLevel = levelValue;
        hideAll();
        showFlex("result-screen");
        resultTitle.textContent = "Your Score: " + latestScore;

        // Show/hide Easier Mode button based on conditions
        if (easierModeBtn) {
          if (latestLevelString && latestLevelString !== "Beginner" && latestScore <= 500) {
            easierModeBtn.classList.remove("is-hidden");
          } else {
            easierModeBtn.classList.add("is-hidden");
          }
        }

        // Render Found Words using learning and base languages
        const listContainer = document.getElementById("found-words-list");
        if (foundWords.length > 0) {
          listContainer.innerHTML = foundWords.map(function(w) {
            // Use getWordText to get text in the correct languages
            // Fallback to furigana/english for backward compatibility
            var learningText = getWordText(w, learningLang);
            if (!learningText) {
              learningText = w.furigana || "";
            }
            var baseText = getWordText(w, baseLang, false);
            if (!baseText) {
              baseText = w.english || "";
            }
            return '<div class="found-word-item">' +
              '<span class="found-word-kana">' + escapeHtml(learningText) + '</span>' +
              '<span class="found-word-en">' + escapeHtml(baseText) + '</span>' +
              '</div>';
          }).join("");
        } else {
          listContainer.innerHTML = '<div style="text-align:center;color:#aaa;">No words found</div>';
        }

        if (window.appCommunication && typeof window.appCommunication.sendMessageToApp === "function") {
          window.appCommunication.sendMessageToApp({
            type: "levelComplete",
            data: { score: latestScore, level: levelValue, completionTimeMs }
          });
        }
        if (window.gameDataService && typeof window.gameDataService.submitResult === "function") {
          var userInfo = null;
          if (window.appCommunication && typeof window.appCommunication.getUserInfo === "function") {
            userInfo = window.appCommunication.getUserInfo();
          }
          var payload = window.gameDataService.buildSubmissionPayload({
            score: latestScore,
            level: levelValue,
            completionTimeMs: completionTimeMs
          }, userInfo || {});
          window.gameDataService.submitResult(payload).catch(function (error) {
            console.warn("[gameDataService] submitResult failed", error);
          });
        }

        // Save game session and words to InstantDB
        if (window.instantDBService) {
          const userId = window.instantDBService.getOrCreateUserId();
          // Add language information to each word for storage
          const wordsWithLang = foundWords.map(function(w) {
            return Object.assign({}, w, {
              learningLang: learningLang,
              baseLang: baseLang
            });
          });
          window.instantDBService.saveGameSession({
            score: latestScore,
            level: levelValue,
            completionTimeMs: completionTimeMs
          }, wordsWithLang).catch(function (error) {
            console.warn("[instantDB] Failed to save game session", error);
          });
        }

        triggerFireworks();
      }
      
      // Handle music toggle request from game
      if (data.action === "toggleBgm") {
        toggleBgm();
        // Send state update back to game
        const gameFrame = document.getElementById("game-frame");
        if (gameFrame && gameFrame.contentWindow) {
          const isPlaying = !bgm.paused && !bgm.muted;
          gameFrame.contentWindow.postMessage({
            action: "musicStateUpdate",
            enabled: isPlaying
          }, "*");
        }
      }
      
      // Handle music state request from game
      if (data.action === "getMusicState") {
        const gameFrame = document.getElementById("game-frame");
        if (gameFrame && gameFrame.contentWindow) {
          const isPlaying = !bgm.paused && !bgm.muted;
          gameFrame.contentWindow.postMessage({
            action: "musicStateUpdate",
            enabled: isPlaying
          }, "*");
        }
      }
    });

    /* 默认预加载一次广告以加快首个展示 */
    if (window.advertisingManager && typeof window.advertisingManager.preload === "function") {
      window.advertisingManager.preload({ sceneType: "reward" });
    }

    function updateMusicButtons() {
      if (!bgm) return;
      const isPlaying = !bgm.paused && !bgm.muted;
      // Update start and result page buttons (game button is now in canvas)
      [musicToggleStart, musicToggleResult].forEach(btn => {
        if (!btn) return;
        btn.setAttribute("aria-pressed", isPlaying ? "true" : "false");
        btn.classList.toggle("is-on", isPlaying);
        btn.classList.toggle("is-off", !isPlaying);
        // Update image display
        const iconOn = btn.querySelector(".music-icon-on");
        const iconOff = btn.querySelector(".music-icon-off");
        if (iconOn && iconOff) {
          iconOn.style.display = isPlaying ? "block" : "none";
          iconOff.style.display = isPlaying ? "none" : "block";
        }
      });
      // Send state update to game canvas
      const gameFrame = document.getElementById("game-frame");
      if (gameFrame && gameFrame.contentWindow) {
        gameFrame.contentWindow.postMessage({
          action: "musicStateUpdate",
          enabled: isPlaying
        }, "*");
      }
    }

    function tryPlayBgm() {
      if (!bgm || !bgmEnabled) {
        updateMusicButtons();
        return;
      }
      const playResult = bgm.play();
      if (playResult && typeof playResult.then === "function") {
        playResult.then(updateMusicButtons).catch(updateMusicButtons);
      } else {
        updateMusicButtons();
      }
    }

    function bindBgmResumeOnGesture() {
      if (bgmResumeBound) return;
      bgmResumeBound = true;
      window.addEventListener("pointerdown", () => {
        tryPlayBgm();
      }, { once: true });
    }

    function toggleBgm() {
      if (!bgm) return;
      if (bgm.paused || bgm.muted) {
        bgm.muted = false;
        bgmEnabled = true;
        tryPlayBgm();
      } else {
        bgm.pause();
        bgmEnabled = false;
        updateMusicButtons();
      }
    }

    if (musicToggleStart) {
      musicToggleStart.addEventListener("click", toggleBgm);
    }
    if (musicToggleGame) {
      musicToggleGame.addEventListener("click", toggleBgm);
      // 已移除 resize 和 orientationchange 监听器，因为改为 absolute 定位后不再需要动态更新位置
    }
    if (musicToggleResult) {
      musicToggleResult.addEventListener("click", toggleBgm);
    }
  </script>
</body>
